<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasty Bites - Menu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg custom-navbar">
    <div class="container">
      <a class="navbar-brand" href="index.html">🍽️ Tasty Bites</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="menu.html">Menu</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About Me</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Page Title -->
  <div class="page-title">
    <h1>Our Menu</h1>
    <p>Choose a section to explore our dishes</p>
  </div>

  <!-- Cart Counter -->
  <div class="container">
    <div class="cart-info">
      🛒 Items in Cart: <span id="cartCount">0</span>
    </div>
  </div>

  <!-- Section Buttons -->
  <div class="container my-4">
    <div class="text-center">
      <button class="btn btn-custom m-2" onclick="showSection('appetizers')">Appetizers</button>
      <button class="btn btn-custom m-2" onclick="showSection('mainCourse')">Main Course</button>
      <button class="btn btn-custom m-2" onclick="showSection('dessert')">Dessert</button>
      <button class="btn btn-custom m-2" onclick="showSection('drinks')">Drinks</button>
    </div>
  </div>

  <!-- Dishes will be displayed here -->
  <div class="container">
    <div id="dishesContainer" class="row"></div>
  </div>

  <!-- Order Summary -->
  <div class="container my-4 text-center">
    <button class="btn btn-highlight btn-lg" onclick="printOrder()">View My Order</button>
  </div>

  <div class="container">
    <div id="orderSummary"></div>
  </div>

  <!-- Footer -->
  <footer class="custom-footer">
    <p>&copy; 2026 Tasty Bites. All Rights Reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/menu.js"></script>
</body>
</html>
